{% include 'includes/message.html' %}
{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velora - Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['"Caveat Brush"', 'cursive'],
          }
        }
      }
    }
  </script>

  <style>
    html {
      font-size: 13px;
    }

    /* Motion simulation */
    .motion-hidden-bottom {
      opacity: 0;
      transform: translateY(20px);
    }

    .motion-visible {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.4s ease-out;
    }
  </style>
</head>

<body
  class="min-h-screen bg-[#fffdf8] font-sans text-gray-900 selection:bg-[#ffc86b] selection:text-black flex flex-col relative">
  <header
    class="bg-[#ffc86b] flex items-center justify-between py-6 px-8 lg:px-16 w-full border-b-[3px] border-black sticky top-0 z-40">
    <a href="{% url 'home' %}" class="flex items-center gap-2 font-display text-3xl tracking-wide">
      <div class="w-8 h-8 rounded-full border-[3px] border-black flex items-center justify-center bg-white">
        <i data-lucide="brush" class="w-4 h-4"></i>
      </div>
      VELORA
    </a>
    <a href="{% url 'login' %}" class="font-bold hover:underline">Back to Login</a>
  </header>

  <div class="flex-1 flex items-center justify-center p-8">
    <div
      class="motion-trigger motion-hidden-bottom w-full max-w-md bg-white border-[4px] border-black rounded-[2.5rem] p-6 md:p-10 shadow-[12px_12px_0px_0px_#ffc86b]">
      
      <div class="w-16 h-16 bg-[#ffc86b] border-[3px] border-black rounded-2xl flex items-center justify-center mb-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
        <i data-lucide="lock-keyhole" class="w-8 h-8 text-black stroke-[3px]"></i>
      </div>

      <h1 class="font-display text-5xl mb-2">New Password</h1>
      <p class="text-gray-600 font-medium mb-8">Create a strong password to secure your account.</p>

      <form id="passwordForm" method="post" action="{% url 'newpass' %}">
        {% csrf_token %}
        <input type="hidden" name="email" value="{{email}}">
        <div class="mb-5">
          <label class="block font-black mb-2 text-xs uppercase tracking-widest text-gray-500">New Password</label>
          <div class="relative">
            <input required type="password" id="new_password" name="new_password" placeholder="••••••••" minlength="8"
              class="w-full bg-[#f9f6f0] border-[3px] border-black rounded-xl px-4 py-3 font-bold text-black focus:outline-none focus:ring-4 focus:ring-[#ffc86b]/50 focus:bg-white transition-all shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] pr-12">
            <button type="button" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-black transition-colors">
              <i data-lucide="eye" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <div class="mb-6">
          <label class="block font-black mb-2 text-xs uppercase tracking-widest text-gray-500">Confirm Password</label>
           <div class="relative">
            <input required type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" minlength="8"
              class="w-full bg-[#f9f6f0] border-[3px] border-black rounded-xl px-4 py-3 font-bold text-black focus:outline-none focus:ring-4 focus:ring-[#ffc86b]/50 focus:bg-white transition-all shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] pr-12">
            <button type="button" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-black transition-colors">
              <i data-lucide="eye" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <p id="password-error" class="hidden text-red-600 font-bold mb-6 text-sm flex items-center gap-2">
          <i data-lucide="alert-circle" class="w-4 h-4"></i> Passwords do not match.
        </p>

        <button type="submit"
          class="w-full bg-[#1a1a1a] text-white rounded-xl py-4 font-black text-lg flex items-center justify-center gap-2 hover:bg-black transition-colors border-[3px] border-black shadow-[4px_4px_0px_0px_#ffc86b] hover:shadow-none hover:translate-x-[4px] hover:translate-y-[4px]">
          Reset Password <i data-lucide="check-circle" class="w-5 h-5"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    lucide.createIcons();

    // Initial load animation
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        document.querySelectorAll('.motion-trigger').forEach(el => {
          el.classList.add('motion-visible');
          el.classList.remove('motion-hidden-bottom');
        });
      }, 50);

      // --- Form Validation Logic ---
      const form = document.getElementById('passwordForm');
      const newPassword = document.getElementById('new_password');
      const confirmPassword = document.getElementById('confirm_password');
      const errorMessage = document.getElementById('password-error');

      form.addEventListener('submit', function (e) {
        if (newPassword.value !== confirmPassword.value) {
          // Prevent form from submitting to the Django backend
          e.preventDefault(); 
          
          // Show error message
          errorMessage.classList.remove('hidden');
          
          // Add visual error state to the confirm input (red border)
          confirmPassword.classList.remove('border-black', 'focus:ring-[#ffc86b]/50');
          confirmPassword.classList.add('border-red-500', 'focus:ring-red-500/30');
        }
      });

      // Clear error styling when the user starts typing again
      confirmPassword.addEventListener('input', function () {
        errorMessage.classList.add('hidden');
        confirmPassword.classList.add('border-black', 'focus:ring-[#ffc86b]/50');
        confirmPassword.classList.remove('border-red-500', 'focus:ring-red-500/30');
      });

      // --- Password Visibility Toggle Logic ---
      const toggleButtons = document.querySelectorAll('.toggle-password');
      
      toggleButtons.forEach(button => {
        button.addEventListener('click', function () {
          // Find the input field right next to the clicked button
          const input = this.previousElementSibling; 
          const icon = this.querySelector('i');

          if (input.type === 'password') {
            input.type = 'text';
            // Change Lucide icon to eye-off
            icon.setAttribute('data-lucide', 'eye-off');
          } else {
            input.type = 'password';
            // Change Lucide icon back to eye
            icon.setAttribute('data-lucide', 'eye');
          }
          
          // Re-render the specific icon
          lucide.createIcons({
            nameAttr: 'data-lucide',
            attrs: {
              class: "w-5 h-5"
            }
          });
        });
      });
    });
  </script>
</body>

</html>
